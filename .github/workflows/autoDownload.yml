name: GetBhavCopy

on:
  schedule:
    # 11:30 UTC = 5:00 PM IST, Mon-Fri
    - cron: '30 11 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'Optional: specific date to fetch, format DDMMYYYY (leave blank for today)'
        required: false
        default: ''

permissions:
  contents: write # required so the workflow can commit and push new data

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node dataDownloader.js ${{ github.event.inputs.date }}

      - name: Run holiday reconciliation
        run: node reconcile.js 45
        continue-on-error: true # don't block the data commit if this step has issues

      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reconciliation_report.json
          git diff --staged --quiet || git commit -m "Add bhavcopy for $(date +'%Y-%m-%d')"
          git push
